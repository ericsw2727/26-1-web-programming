<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유성원 / 4-2(JavaScript 계산기)</title>
    <link rel="stylesheet" href="실습4-2_산학연계.css" />
  </head>
  <body>
    <div class="calculator">
      <h1>사칙연산 계산기</h1>

      <label for="first-number">첫 번째 숫자</label>
      <input id="first-number" type="number" />

      <label for="second-number">두 번째 숫자</label>
      <input id="second-number" type="number" />

      <div class="button-row">
        <button id="add-button">더하기</button>
        <button id="subtract-button">빼기</button>
        <button id="multiply-button">곱하기</button>
        <button id="divide-button">나누기</button>
        <button id="clear-button">C</button>
      </div>

      <p class="result-label">계산 결과</p>
      <p id="result">0</p>
    </div>

    <script src="실습4-2_산학연계.js"></script>
  </body>
</html>
